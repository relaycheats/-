<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CROWN IS MY DADDY</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050505; 
      gap: 50px;
      overflow: hidden;
    }

    .eye-container {
      position: relative;
      width: 120px;
      height: 120px;
      animation: shake 4s infinite; 
    }

    .eye {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #fdfbf7 10%, #e0e0e0 60%, #8a0000 100%); 
      border-radius: 50%;
      border: 2px solid #300;
      box-shadow: 0 0 20px rgba(139, 0, 0, 0.6), inset 0 0 30px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    
    .eye::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 50% 50%, transparent 40%, rgba(180, 0, 0, 0.4) 45%, transparent 50%),
        repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(150, 0, 0, 0.2) 10px, rgba(150, 0, 0, 0.2) 11px);
      border-radius: 50%;
      opacity: 0.6;
      z-index: 1;
    }

    .pupil {
      width: 45px;
      height: 45px;
      background: #000;
      border-radius: 50%;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 10px rgba(0,0,0,0.8);
      transition: transform 0.05s ease-out;
      
      transform: scale(1.2); 
    }

    
    .pupil::after {
      content: '';
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      position: absolute;
      top: 10px;
      left: 10px;
      filter: blur(1px);
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-1px, 1px) rotate(-0.5deg); }
      50% { transform: translate(1px, -1px) rotate(0.5deg); }
      75% { transform: translate(-1px, -1px) rotate(-0.5deg); }
    }
  </style>
</head>
<body>

  <div class="eye-container">
    <div class="eye"><div class="pupil"></div></div>
  </div>
  <div class="eye-container">
    <div class="eye"><div class="pupil"></div></div>
  </div>

  <script>
    const pupils = document.querySelectorAll('.pupil');

    document.addEventListener('mousemove', (e) => {
      pupils.forEach((pupil) => {
        const eye = pupil.parentElement;
        const rect = eye.getBoundingClientRect();
        const eyeX = rect.left + rect.width / 2;
        const eyeY = rect.top + rect.height / 2;

        const deltaX = e.clientX - eyeX;
        const deltaY = e.clientY - eyeY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        
        
        const maxMove = 35; 

        const moveX = (deltaX / distance) * Math.min(distance, maxMove);
        const moveY = (deltaY / distance) * Math.min(distance, maxMove);

        
        const jitterX = (Math.random() - 0.5) * 2;
        const jitterY = (Math.random() - 0.5) * 2;

        pupil.style.transform = `translate(calc(-50% + ${moveX + jitterX}px), calc(-50% + ${moveY + jitterY}px)) scale(1.2)`;
      });
    });
  </script>

</body>
</html>
